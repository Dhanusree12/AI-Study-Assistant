<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Assistant - Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div class="auth-container">
        <!-- Illustration Side -->
        <div class="auth-illustration">
            <svg width="200" height="200" viewBox="0 0 24 24" fill="var(--primary-dark)"
                xmlns="http://www.w3.org/2000/svg" style="margin-bottom: 20px;">
                <path
                    d="M19 3H5C3.89 3 3 3.9 3 5V19C3 20.1 3.89 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3M19 19H5V5H19V19M11 7H13V11H17V13H13V17H11V13H7V11H11V7Z" />
            </svg>
            <h2>Join the Club!</h2>
            <p>Create your new AI Study buddy account today.</p>
        </div>

        <!-- Form Side -->
        <div class="auth-form-container">
            <h1 style="font-size:28px;">Sign Up</h1>
            <p>Start learning smarter, not harder.</p>

            <form id="signup-form">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                    <i class="fa-regular fa-user"></i>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="example@student.com" required>
                    <i class="fa-regular fa-envelope"></i>
                    <small id="email-error"
                        style="color:var(--danger); display:none; font-size: 12px; margin-top:5px;">Invalid email
                        format</small>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fa-regular fa-eye-slash" id="toggle-signup-password"></i>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="••••••••" required>
                    <small id="password-error"
                        style="color:var(--danger); display:none; font-size: 12px; margin-top:5px;">Passwords do not
                        match</small>
                </div>

                <button type="submit" class="btn auth-btn">Create Account</button>

                <div class="auth-divider"><span>OR</span></div>

                <div id="g_id_onload"
                    data-client_id="971620819061-8joccl2arsbcm3r1a4ehu35r8730rilg.apps.googleusercontent.com"
                    data-context="signup" data-ux_mode="popup" data-callback="handleGoogleLogin"
                    data-auto_prompt="false">
                </div>
                <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline"
                    data-text="continue_with" data-size="large" data-logo_alignment="left" data-width="100%">
                </div>
            </form>

            <div class="auth-links">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
